name: Build and Push Prod Image

on:
  push:
    branches: [ main ]  # Triggers on merges/pushes to main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Tests with Coverage
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pytest tests --cov=. --cov-report=xml:coverage.xml

      - name: Resolve image version
        id: version
        run: |
            version=$(python3 - <<'PY'
            import tomllib
            from pathlib import Path
            data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
            print(data["project"]["version"])
            PY
            )
            echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image (Prod)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            docker.io/travler7282/roboarm:${{ steps.version.outputs.version }}
            docker.io/travler7282/roboarm:${{ github.sha }}